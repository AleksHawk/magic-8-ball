<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>magicblock oracle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <audio id="sound-shake" src="https://assets.mixkit.co/sfx/preview/mixkit-magic-sweep-game-trophy-257.mp3" preload="auto"></audio>
    <audio id="sound-reveal" src="https://assets.mixkit.co/sfx/preview/mixkit-fairy-arcade-sparkle-866.mp3" preload="auto"></audio>

    <div id="stars-container">
        <div id="stars"></div>
        <div id="nebula"></div>
    </div>
    
    <div class="container">
        <header class="main-header">
            <img src="logo-main.png" alt="magicblock logo" class="neon-logo">
        </header>

        <div class="main-content-wrapper" id="capture-area">
            <div class="ball-wrapper">
                <div class="magic-ball-outer">
                    <div class="magic-ball" id="magic-ball">
                        
                        <div class="window-bezel">
                            <div class="window">
                                <div class="eight-logo-container" id="eight">
                                    <img src="logo-ball.png" alt="mb logo" class="center-logo">
                                </div>
                                <div class="triangle hidden" id="triangle">
                                    <span class="answer-text" id="answer"></span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <div class="instructions neon-box" id="instructions-box">
                <h2>how it works:</h2>
                <ol>
                    <li>clear your mind and ask a yes/no question.</li>
                    <li>tap the ball to awaken the magic.</li>
                    <li>save your prophecy!</li>
                </ol>
            </div>
        </div>
       
        <button id="download-btn" class="neon-button hidden">save prophecy</button>
    </div>

    <div id="screenshot-export" class="screenshot-export">
        <img src="logo-main.png" alt="magicblock logo" class="screenshot-main-logo">
        
        <div class="screenshot-title">the magicblock oracle has spoken:</div>
        <div class="screenshot-big-answer" id="screenshot-big-answer">without a doubt</div>
        <div class="screenshot-subtitle">seek your own destiny!</div>
        
        <div class="screenshot-ball-container">
            <div class="screenshot-ball-bezel">
                <div class="screenshot-triangle">
                    <span class="screenshot-answer-text" id="screenshot-small-answer">without a doubt</span>
                </div>
            </div>
            <img src="logo-ball.png" alt="mb" class="screenshot-hat">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
